name: ci

on:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: anylang
          POSTGRES_PASSWORD: anylang
          POSTGRES_DB: anylang
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U anylang -d anylang"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check app
      - name: Migrate
        env:
          SECRET_KEY: ci-secret-key-must-be-at-least-thirty-two-characters-long
          DATABASE_URL: postgresql+asyncpg://anylang:anylang@localhost:5432/anylang
          REDIS_URL: redis://localhost:6379/0
          APP_ENV: local
          DEBUG: "false"
        run: alembic upgrade head
      - name: Import check
        env:
          SECRET_KEY: ci-secret-key-must-be-at-least-thirty-two-characters-long
          DATABASE_URL: postgresql+asyncpg://anylang:anylang@localhost:5432/anylang
          REDIS_URL: redis://localhost:6379/0
          APP_ENV: local
        run: python -c "from app.main import app; assert app.title"

  admin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: admin/package-lock.json
      - run: npm ci || npm install
      - run: npx tsc --noEmit
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
