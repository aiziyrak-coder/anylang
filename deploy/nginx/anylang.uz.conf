# anylang.uz — isolated vhost; does not modify other sites.
# Landing: /  |  Admin: /admin  |  API: /api/v1  |  WS: /ws/
#
# Production TLS: certbot usually adds a listen 443 ssl server and turns :80 into
# a redirect. Keep ACME challenge working on :80. Do not deploy this file blindly
# over a live certbot-managed conf without merging SSL certificate paths.

server {
    listen 80;
    listen [::]:80;
    server_name anylang.uz www.anylang.uz;

    client_max_body_size 50M;

    # Security headers (also set by API/admin apps)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        allow all;
    }

    # Public marketing site
    location / {
        root /var/www/anylang;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Admin panel (Next.js basePath=/admin)
    location /admin {
        proxy_pass http://127.0.0.1:3105;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Admin BFF — Next.js with basePath=/admin
    location /api/auth/ {
        proxy_pass http://127.0.0.1:3105/admin/api/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/proxy/ {
        proxy_pass http://127.0.0.1:3105/admin/api/proxy/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # FastAPI backend
    location /api/ {
        proxy_pass http://127.0.0.1:8105/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # WebSocket
    location = /ws {
        return 301 /ws/;
    }
    location /ws/ {
        proxy_pass http://127.0.0.1:8105/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Health (optional public probe)
    location = /health {
        proxy_pass http://127.0.0.1:8105/health;
        proxy_set_header Host $host;
    }

    # MinIO public media
    location /media/ {
        proxy_pass http://127.0.0.1:19002/anylang/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
