# anylang.uz — production vhost (Certbot TLS). Do not overwrite without SSL blocks.
# Landing: /  |  Admin: /admin  |  API: /api/  |  WS: /ws

server {
    server_name anylang.uz www.anylang.uz;

    client_max_body_size 50M;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    # Public marketing site
    location / {
        root /var/www/anylang;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Admin panel (Next.js basePath=/admin)
    location /admin {
        proxy_pass http://127.0.0.1:3105;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Admin BFF — Next.js with basePath=/admin
    location /api/auth/ {
        proxy_pass http://127.0.0.1:3105/admin/api/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/proxy/ {
        proxy_pass http://127.0.0.1:3105/admin/api/proxy/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # FastAPI backend
    location /api/ {
        proxy_pass http://127.0.0.1:8105/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # WebSocket — FastAPI routes: /ws and /ws/
    location = /ws {
        proxy_pass http://127.0.0.1:8105;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
    location = /ws/ {
        proxy_pass http://127.0.0.1:8105;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Health (optional public probe)
    location = /health {
        proxy_pass http://127.0.0.1:8105/health;
        proxy_set_header Host $host;
    }

    location = /ready {
        proxy_pass http://127.0.0.1:8105/ready;
        proxy_set_header Host $host;
    }

    # MinIO public media
    location /media/ {
        proxy_pass http://127.0.0.1:19002/anylang/;
        proxy_set_header Host 127.0.0.1:19002;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/anylang.uz/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/anylang.uz/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.anylang.uz) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = anylang.uz) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name anylang.uz www.anylang.uz;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        allow all;
    }

    return 404; # managed by Certbot
}
