    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.3
  dio: ^5.9.2
  flutter_svg: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
